name: CMake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        triplet: [x86-windows, x64-windows, x64-linux, x64-macos]
        include:
          - triplet: x86-windows
            system: windows-latest
            mono: ""
          - triplet: x64-windows
            system: windows-latest
            mono: ""
          - triplet: x64-linux
            system: ubuntu-latest
            mono: "mono"
          - triplet: x64-macos
            system: macos-latest
            mono: "mono"
    runs-on: ${{ matrix.system }}
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'
      VCPKG_USER: rioki
      VCPKG_FEED_URL: https://nuget.pkg.github.com/rioki/index.json
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Install Mono on Linux
      if: runner.os == 'Linux'
      run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete
    - name: Install Mono on macOS
      if: runner.os == 'macOS'
      run: brew install mono
    - name: Install CMake
      uses: lukka/get-cmake@latest
    - name: Restore from cache and install vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 40c0d758e1cc99a505b039a9a7e792154119c927
    - name: 'Setup NuGet/Vcpkg Credentials'
      shell: 'bash'
      run: |
        NUGET=$("$RUNVCPKG_VCPKG_ROOT/vcpkg" fetch nuget | tail -n 1)
        "$NUGET" sources add -source "${{env.VCPKG_FEED_URL}}" -storepasswordincleartext -name "GitHub" -username "${{env.VCPKG_USER}}" -password "${{ secrets.VCPKG_PAT_TOKEN }}"
        "$NUGET" setapikey "${{ secrets.VCPKG_PAT_TOKEN }}" -source "${{env.VCPKG_FEED_URL}}"
    - name: Build Debug
      uses: lukka/run-cmake@v10
      with:
        configurePreset: 'ninja-debug'
        buildPreset: 'ninja-debug'
        testPreset: 'ninja-debug'
    - name: Build Release
      uses: lukka/run-cmake@v10
      with:
        configurePreset: 'ninja-release'
        buildPreset: 'ninja-release'
        testPreset: 'ninja-release'
